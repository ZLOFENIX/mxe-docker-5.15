name: Build MXE Docker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-mxe.yml'
      - 'build-mxe.sh'
      - 'Dockerfile.mxe'

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h /

      - name: Restore MXE Cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: /opt/mxe
          key: mxe-build-${{ hashFiles('build-mxe.sh') }}
          restore-keys: |
            mxe-build-

      - name: Install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake autopoint bash bison bzip2 flex g++ g++-multilib \
            gettext git gperf intltool libc6-dev-i386 libgdk-pixbuf2.0-dev \
            libltdl-dev libssl-dev libtool libtool-bin make openssl p7zip-full \
            patch pkg-config python3 python3-pip python-is-python3 unzip wget \
            xz-utils cmake ninja-build lzip fakeroot libjson-perl
          sudo pip3 install --break-system-packages mako

      - name: Clone MXE
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          [ -d /opt/mxe ] || git clone --depth 1 https://github.com/mxe/mxe.git /opt/mxe

      - name: Build MXE
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo chown -R $(whoami):$(whoami) /opt/mxe
          bash build-mxe.sh

      - name: Upload MXE logs
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mxe-logs
          path: /opt/mxe/log/
          if-no-files-found: ignore
          retention-days: 7

      - name: Package Qt Runtime
        run: |
          QT=/opt/mxe/usr/i686-w64-mingw32.shared
          mkdir -p qt-dist
          
          # Qt DLLs
          cp $QT/qt5/bin/Qt5*.dll qt-dist/
          
          # QML + plugins
          cp -r $QT/qt5/qml qt-dist/
          cp -r $QT/qt5/plugins qt-dist/
          
          # Runtime DLLs (mingw + зависимости)
          cp $QT/bin/libgcc_s_sjlj-1.dll $QT/bin/libstdc++-6.dll \
             $QT/bin/libwinpthread-1.dll qt-dist/
          cp $QT/bin/libfreetype-6.dll $QT/bin/libharfbuzz-0.dll \
             $QT/bin/libpng16-16.dll $QT/bin/libjpeg-9.dll \
             $QT/bin/zlib1.dll $QT/bin/libbz2.dll $QT/bin/libzstd.dll \
             $QT/bin/libpcre2-16-0.dll $QT/bin/libpcre-1.dll \
             $QT/bin/libglib-2.0-0.dll $QT/bin/libintl-8.dll \
             $QT/bin/libiconv-2.dll qt-dist/
          
          # OpenSSL
          cp $QT/bin/libcrypto-*.dll $QT/bin/libssl-*.dll qt-dist/
          
          # WebKit + ICU (для WebKit)
          cp $QT/qt5/bin/Qt5WebKit*.dll qt-dist/ 2>/dev/null || true
          cp $QT/bin/icu*.dll qt-dist/ 2>/dev/null || true
          cp $QT/bin/libxml2*.dll $QT/bin/libxslt*.dll qt-dist/ 2>/dev/null || true
          
          cd qt-dist && 7z a -mx9 ../qt-runtime.zip . && cd ..

      - name: Upload Qt Runtime
        uses: actions/upload-artifact@v4
        with:
          name: qt-runtime
          path: qt-runtime.zip
          retention-days: 90
          
      - name: Save MXE Cache
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /opt/mxe
          key: mxe-build-${{ hashFiles('build-mxe.sh') }}
          
      - name: Prepare Docker Context
        run: sudo cp -r /opt/mxe/usr ./mxe-usr

      - name: Lowercase image name
        run: echo "IMAGE_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.mxe
          push: true
          tags: ghcr.io/${{ env.IMAGE_LC }}:latest
