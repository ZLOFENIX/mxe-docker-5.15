name: Build MXE Docker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-mxe.yml'
      - 'build-mxe.sh'
      - 'Dockerfile.mxe'

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h /

      - name: Restore MXE Cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: /opt/mxe
          key: mxe-build-${{ hashFiles('build-mxe.sh') }}
          restore-keys: |
            mxe-build-

      - name: Install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake autopoint bash bison bzip2 flex g++ g++-multilib \
            gettext git gperf intltool libc6-dev-i386 libgdk-pixbuf2.0-dev \
            libltdl-dev libssl-dev libtool libtool-bin make openssl p7zip-full \
            patch pkg-config python3 python3-pip python-is-python3 unzip wget \
            xz-utils cmake ninja-build lzip fakeroot libjson-perl
          sudo pip3 install --break-system-packages mako

      - name: Clone MXE
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          [ -d /opt/mxe ] || git clone --depth 1 https://github.com/mxe/mxe.git /opt/mxe

      - name: Build MXE
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo chown -R $(whoami):$(whoami) /opt/mxe
          bash build-mxe.sh

      - name: Upload MXE logs
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mxe-logs
          path: /opt/mxe/log/
          if-no-files-found: ignore
          retention-days: 7

      - name: Package Qt Runtime
        run: |
          QT=/opt/mxe/usr/i686-w64-mingw32.shared
          mkdir -p qt-dist
          
          # 1. Qt DLLs (Удаляем только DBus и Help)
          cp $QT/qt5/bin/Qt5*.dll qt-dist/
          rm -f qt-dist/Qt5DBus.dll qt-dist/Qt5Help.dll
          
          # Удаляем лишние harfbuzz и cairo, чтобы не тянуть кучу лишних зависимостей
          rm -f qt-dist/libharfbuzz-cairo-*.dll qt-dist/libharfbuzz-gobject-*.dll \
                qt-dist/libharfbuzz-gpu-*.dll qt-dist/libharfbuzz-icu-*.dll \
                qt-dist/libharfbuzz-raster-*.dll qt-dist/libharfbuzz-subset-*.dll \
                qt-dist/libharfbuzz-vector-*.dll qt-dist/libcairo-2.dll
          
          # 2. QML (содержимое папки qml в корень архива)
          cp -r $QT/qt5/qml/* qt-dist/
          
          # 3. Plugins (полностью)
          cp -r $QT/qt5/plugins qt-dist/
          
          # Удаляем Linux-специфичный плагин
          rm -f qt-dist/plugins/platformthemes/qxdgdesktopportal.dll
          
          # 4. Runtime + 3rd-party DLLs
          for f in libgcc_s_sjlj-1.dll libstdc++-6.dll libwinpthread-1.dll \
                   libfreetype-*.dll libharfbuzz-0.dll libpng16-*.dll libjpeg-*.dll \
                   zlib1.dll libbz2*.dll libzstd.dll liblzma-*.dll \
                   libpcre2-16-*.dll libpcre2-8-*.dll libpcre-*.dll \
                   libglib-2.0-0.dll libgobject-2.0-0.dll libffi-*.dll \
                   libintl-*.dll libiconv-*.dll libcrypto-*.dll libssl-*.dll \
                   libbrotlidec.dll libbrotlicommon.dll \
                   icu*.dll libxml2*.dll libxslt*.dll \
                   libsqlite3-*.dll libsharpyuv-*.dll libwebp*.dll \
                   libtiff-*.dll libjasper.dll libmng-*.dll liblcms2-*.dll; do
            
            # Проверяем, есть ли совпадения в исходной папке
            matches=$(ls $QT/bin/$f 2>/dev/null)
            if [ -n "$matches" ]; then
              cp $QT/bin/$f qt-dist/
            else
              echo "WARN: Pattern '$f' not found in MXE bin/"
            fi
          done
          
          # Проверка критичных компонентов
          echo "=== Critical checks ==="
          [ -f qt-dist/plugins/platforms/qwindows.dll ] && echo "OK: qwindows.dll" || echo "FATAL: qwindows.dll MISSING!"
          [ -f qt-dist/Qt5Svg.dll ] && echo "OK: Qt5Svg.dll" || echo "WARN: Qt5Svg.dll missing"
          ls qt-dist/Qt5WebKit*.dll >/dev/null 2>&1 && echo "OK: WebKit present" || echo "NOTE: WebKit missing"
          
          echo "=== Final DLL count: $(ls qt-dist/*.dll | wc -l) ==="

      - name: Upload Qt Runtime
        uses: actions/upload-artifact@v4
        with:
          name: qt-runtime
          path: qt-dist/
          retention-days: 90
          
      - name: Save MXE Cache
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /opt/mxe
          key: mxe-build-${{ hashFiles('build-mxe.sh') }}
          
      - name: Prepare Docker Context
        run: sudo cp -r /opt/mxe/usr ./mxe-usr

      - name: Lowercase image name
        run: echo "IMAGE_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.mxe
          push: true
          tags: ghcr.io/${{ env.IMAGE_LC }}:latest
