name: Build MXE Docker

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/build-mxe.yml'
      - 'Dockerfile.mxe'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.mxe
          push: true
          tags: ghcr.io/${{ env.IMAGE_LC }}:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.IMAGE_LC }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ env.IMAGE_LC }}:cache,mode=max
