name: Build MXE Docker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-mxe.yml'
      - 'build-mxe.sh'
      - 'Dockerfile.mxe'

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h /

      - name: Restore MXE Cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: /opt/mxe
          key: mxe-build-${{ hashFiles('build-mxe.sh') }}
          restore-keys: |
            mxe-build-

      - name: Install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake autopoint bash bison bzip2 flex g++ g++-multilib \
            gettext git gperf intltool libc6-dev-i386 libgdk-pixbuf2.0-dev \
            libltdl-dev libssl-dev libtool libtool-bin make openssl p7zip-full \
            patch pkg-config python3 python3-pip python-is-python3 unzip wget \
            xz-utils cmake ninja-build lzip fakeroot libjson-perl
          sudo pip3 install --break-system-packages mako

      - name: Clone MXE
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          [ -d /opt/mxe ] || git clone --depth 1 https://github.com/mxe/mxe.git /opt/mxe

      - name: Build MXE
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo chown -R $(whoami):$(whoami) /opt/mxe
          bash build-mxe.sh

      - name: Upload MXE logs
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mxe-logs
          path: /opt/mxe/log/
          if-no-files-found: ignore
          retention-days: 7

      - name: Package Qt Runtime
        run: |
          QT=/opt/mxe/usr/i686-w64-mingw32.shared
          mkdir -p qt-dist
          
          # Qt DLLs
          cp $QT/qt5/bin/Qt5*.dll qt-dist/
          
          # QML + plugins
          cp -r $QT/qt5/qml qt-dist/
          cp -r $QT/qt5/plugins qt-dist/
          
          # Runtime DLLs (по маскам)
          for f in libgcc_s_sjlj-1.dll libstdc++-6.dll libwinpthread-1.dll \
                   libfreetype-*.dll libharfbuzz-*.dll libpng16-*.dll libjpeg-*.dll \
                   zlib1.dll libbz2*.dll libzstd.dll libpcre2-16-*.dll libpcre-*.dll \
                   libglib-2.0-0.dll libintl-*.dll libiconv-*.dll \
                   libcrypto-*.dll libssl-*.dll \
                   icu*.dll libxml2*.dll libxslt*.dll; do
            cp $QT/bin/$f qt-dist/ 2>/dev/null || true
          done
          
          # Проверка критичных DLL
          echo "=== Checking critical DLLs ==="
          MISSING=0
          for check in "libgcc_s_sjlj-1.dll" "libstdc++-6.dll" "libwinpthread-1.dll" \
                       "libfreetype-*.dll" "libharfbuzz-*.dll" "libpng16-*.dll" \
                       "libjpeg-*.dll" "zlib1.dll" "libpcre2-16-*.dll" \
                       "libglib-2.0-0.dll" "libcrypto-*.dll" "libssl-*.dll" \
                       "Qt5Core.dll" "Qt5Gui.dll" "Qt5Network.dll" \
                       "Qt5Qml.dll" "Qt5Quick.dll" "Qt5QuickControls2.dll"; do
            if ! ls qt-dist/$check >/dev/null 2>&1; then
              echo "WARNING: Missing $check"
              MISSING=$((MISSING+1))
            fi
          done
          
          # WebKit (необязательно)
          for check in "Qt5WebKit.dll" "Qt5WebKitWidgets.dll" "icudt*.dll" "icuin*.dll" "icuuc*.dll"; do
            if ! ls qt-dist/$check >/dev/null 2>&1; then
              echo "NOTE: WebKit-related $check not found (OK if WebKit disabled)"
            fi
          done
          
          echo "=== Missing critical: $MISSING ==="
          
          cd qt-dist && 7z a -mx9 ../qt-runtime.zip . && cd ..

      - name: Upload Qt Runtime
        uses: actions/upload-artifact@v4
        with:
          name: qt-runtime
          path: qt-runtime.zip
          retention-days: 90
          
      - name: Save MXE Cache
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /opt/mxe
          key: mxe-build-${{ hashFiles('build-mxe.sh') }}
          
      - name: Prepare Docker Context
        run: sudo cp -r /opt/mxe/usr ./mxe-usr

      - name: Lowercase image name
        run: echo "IMAGE_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.mxe
          push: true
          tags: ghcr.io/${{ env.IMAGE_LC }}:latest
