name: Build MXE Docker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-mxe.yml'
      - 'build-mxe.sh'
      - 'Dockerfile.mxe'

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h /

      - name: Setup MXE Cache
        id: cache
        uses: actions/cache@v4
        with:
          path: /opt/mxe
          key: mxe-build-${{ hashFiles('build-mxe.sh') }}
          restore-keys: |
            mxe-build-
          save-always: true

      - name: Install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake autopoint bash bison bzip2 flex g++ g++-multilib \
            gettext git gperf intltool libc6-dev-i386 libgdk-pixbuf2.0-dev \
            libltdl-dev libssl-dev libtool libtool-bin make openssl p7zip-full \
            patch pkg-config python3 python3-pip python-is-python3 unzip wget \
            xz-utils cmake ninja-build lzip fakeroot libjson-perl
          sudo pip3 install --break-system-packages mako

      - name: Clone MXE
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          [ -d /opt/mxe ] || git clone --depth 1 https://github.com/mxe/mxe.git /opt/mxe

      - name: Build MXE
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo chown -R $(whoami):$(whoami) /opt/mxe
          bash build-mxe.sh

      - name: Upload MXE logs
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mxe-logs
          path: /opt/mxe/log/
          if-no-files-found: ignore
          retention-days: 7

      - name: Prepare Docker Context
        run: sudo cp -r /opt/mxe/usr ./mxe-usr

      - name: Lowercase image name
        run: echo "IMAGE_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.mxe
          push: true
          tags: ghcr.io/${{ env.IMAGE_LC }}:latest
